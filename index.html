<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deshboard Pessoa | SENAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="side-header-header">
                <div class="logo">
                    <i class="fas fa-chartline"></i>
                    <span>AdminPro</span>
                </div>
                <button class="sidebat-toggle" id="sidebar-toggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>

            <nav class="siebar-nav">
                <ul>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-tachmeter-alt">
                            </i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                     <li class="active">
                        <a href="#">
                            <i class="fas fa-users-alt">
                            </i>
                            <span>Usuários</span>
                        </a>
                    </li>
                     <li class="active">
                        <a href="#">
                            <i class="fas fa-sells-alt">
                            </i>
                            <span>Vendas</span>
                        </a>
                    </li>
                     <li class="active">
                        <a href="#">
                            <i class="fas fa-relatorios-alt">
                            </i>
                            <span>Relatórios</span>
                        </a>
                    </li>
                     <li class="active">
                        <a href="#">
                            <i class="fas fa-config-alt">
                            </i>
                            <span>Configurações</span>
                        </a>
                    </li>
                    <li class="active">
                        <a href="#">
                            <i class="fas fa-out-alt">
                            </i>
                            <span>Sair</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <a href="#">
                    <i class="fa-sign-out-alt"></i>
                    <span>Sair</span>
                </a>
            </div>
        </aside>
        <!---Conteudo principal-->
        <div class="main-content">
            <header class="topbar">
                <div class="search-area">
                    <i class="fas fa-search"></i>
                </div>
                <div class="user-area">
                    <buton class="dark-mode-toggle" id="darkModeToggle">
                        <i class="fas fa-moon">  </i>
                    </buton>
                </div>
                <div class="notification">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </div>
                <div class="user-profile"> <img src="https://pbs.twimg.com/media/GKV22CKboAAynPu.png" width="150"
                    ">
                <span>Thomas Batista</span>
                <i class=" fas fa-chevron-down"></i>
                </div>
            </header>
            <main>
                <div class="page-header">
                    <h1>Dashboard</h1>
                    <p>Bem-vindo de volta, Thomas! Aqui está o resumo do seu negócio</p>
                </div>

                <div class="cards-grid">
                    <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-dollar-sign"></i>
                        </div>
                        <div class="card-info">
                            <h3>Faturamento</h3>
                            <p class="value">R$ 47.892</p>
                            <span class="trend up">+12,5%</span>
                        </div>
                        <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="card-info">
                            <h3>Clientes</h3>
                            <p class="value">1.284</p>
                            <span class="trend up">+8,2%</span>
                        </div>
                        <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-shopping-bag"></i>
                        </div>
                        <div class="card-info">
                            <h3>Vendas</h3>
                            <p class="value">3.231</p>
                            <span class="trend down">-2,2%</span>
                        </div>
                        <div class="card">
                        <div class="card-icon">
                            <i class="fas fa-star"></i>
                        </div>
                        <div class="card-info">
                            <h3>Conversão</h3>
                            <p class="value">23,8%</p>
                            <span class="trend up">+6,7%</span>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
